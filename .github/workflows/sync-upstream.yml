name: Sync upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Setup upstream
        run: |
          git remote add upstream https://github.com/openwrt/openwrt.git
          git config user.email "geekwrt@users.noreply.github.com"
          git config user.name "GeekWRT"

      - name: Sync openwrt-25.12
        run: |
          git fetch origin openwrt-25.12
          git fetch upstream openwrt-25.12
          git checkout -b openwrt-25.12 origin/openwrt-25.12
          git rebase upstream/openwrt-25.12 || {
            echo "CONFLICT! aborting..."
            git rebase --abort
            exit 1
          }
          git push https://x-access-token:${{ secrets.GH_SYNC_TOKEN }}@github.com/${{ github.repository }}.git openwrt-25.12 --force

      - name: Sync master
        run: |
          git fetch upstream main
          git checkout master
          git rebase upstream/main || {
            echo "CONFLICT! aborting..."
            git rebase --abort
            exit 1
          }
          git push https://x-access-token:${{ secrets.GH_SYNC_TOKEN }}@github.com/${{ github.repository }}.git master --force

      - name: Notify on conflict
        if: failure()
        run: |
          echo "::error::Sync conflict detected! Resolve locally"
          echo "::error::master: git fetch upstream main && git checkout master && git rebase upstream/main && git push fork master --force"
          echo "::error::openwrt-25.12: git fetch upstream openwrt-25.12 && git checkout openwrt-25.12 && git rebase upstream/openwrt-25.12 && git push fork openwrt-25.12 --force"
