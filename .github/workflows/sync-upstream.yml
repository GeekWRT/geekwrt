name: Sync upstream

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Setup upstream
        run: |
          git remote add upstream https://github.com/openwrt/openwrt.git
          git config user.email "geekwrt@users.noreply.github.com"
          git config user.name "GeekWRT"

      - name: Sync openwrt-25.12（无自定义 commit，用快进合并）
        run: |
          git fetch upstream openwrt-25.12
          git checkout openwrt-25.12
          git merge --ff-only upstream/openwrt-25.12 && \
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git openwrt-25.12 || \
            echo "openwrt-25.12: no fast-forward possible, skipping"

      - name: Sync master（含 XR30 commit，用 rebase）
        run: |
          git fetch upstream master
          git checkout master
          git rebase upstream/master || {
            echo "CONFLICT! master rebase failed, aborting..."
            git rebase --abort
            exit 1
          }
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git master --force

      - name: Notify on conflict
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ 上游同步冲突，需要手动解决',
              body: 'master 分支 rebase 上游时出现冲突，请本地手动处理：\n\n```bash\n' +
                'git fetch upstream master\n' +
                'git checkout master\n' +
                'git rebase upstream/master\n' +
                '# 解决冲突后：\n' +
                'git add .\n' +
                'git rebase --continue\n' +
                'git push fork master --force\n' +
                '```'
            })
